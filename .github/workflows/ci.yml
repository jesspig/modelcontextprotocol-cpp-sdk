name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, ubuntu-24.04, macos-15]
        build_type: [debug, release]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/sccache
            C:\Users\runneradmin\AppData\Local\Mozilla\sccache
          key: sccache-${{ matrix.os }}-${{ matrix.build_type }}-${{ github.sha }}
          restore-keys: |
            sccache-${{ matrix.os }}-${{ matrix.build_type }}-
            sccache-${{ matrix.os }}-

      - name: Configure
        run: cmake --preset ${{ matrix.build_type }} -DMCP_WERROR=ON

      - name: Build
        run: cmake --build --preset ${{ matrix.build_type }}

      - name: Test
        run: ctest --preset ${{ matrix.build_type }} --output-on-failure