name: Feature Request
description: Suggest an idea
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
  - type: dropdown
    id: sdk
    attributes:
      label: Which SDK layer?
      options:
        - Server
        - Client
        - Transport
        - Protocol
        - OAuth
        - Build/CI
